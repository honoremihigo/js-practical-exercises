<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShopFlow - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary": "#006c49",
                      "on-primary-fixed-variant": "#3a4667",
                      "on-background": "#191c1e",
                      "on-secondary-fixed": "#002113",
                      "surface-tint": "#525d80",
                      "background": "#f7f9fb",
                      "error": "#ba1a1a",
                      "surface-container-high": "#e6e8ea",
                      "on-tertiary": "#ffffff",
                      "on-primary-container": "#8691b7",
                      "primary": "#081534",
                      "on-tertiary-fixed": "#271900",
                      "surface-container": "#eceef0",
                      "secondary-fixed-dim": "#4edea3",
                      "on-secondary": "#ffffff",
                      "on-secondary-container": "#00714d",
                      "error-container": "#ffdad6",
                      "surface-container-highest": "#e0e3e5",
                      "secondary-fixed": "#6ffbbe",
                      "on-surface-variant": "#45464e",
                      "on-error-container": "#93000a",
                      "inverse-primary": "#bac5ee",
                      "surface-variant": "#e0e3e5",
                      "tertiary-container": "#3b2800",
                      "on-error": "#ffffff",
                      "primary-fixed-dim": "#bac5ee",
                      "on-tertiary-container": "#ac8e5b",
                      "on-secondary-fixed-variant": "#005236",
                      "surface-dim": "#d8dadc",
                      "secondary-container": "#6cf8bb",
                      "surface": "#f7f9fb",
                      "tertiary": "#211500",
                      "inverse-surface": "#2d3133",
                      "tertiary-fixed": "#ffdea7",
                      "outline": "#76777f",
                      "on-tertiary-fixed-variant": "#594317",
                      "tertiary-fixed-dim": "#e3c28a",
                      "outline-variant": "#c6c6cf",
                      "surface-bright": "#f7f9fb",
                      "surface-container-low": "#f2f4f6",
                      "primary-fixed": "#dae2ff",
                      "inverse-on-surface": "#eff1f3",
                      "primary-container": "#1e2a4a",
                      "on-surface": "#191c1e",
                      "surface-container-lowest": "#ffffff",
                      "on-primary-fixed": "#0d1a39",
                      "on-primary": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Manrope", "sans-serif"
                      ],
                      "body": [
                              "Inter", "sans-serif"
                      ],
                      "label": [
                              "Inter", "sans-serif"
                      ]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom hide scrollbar for cleaner look if needed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary to-primary-container flex flex-col items-center justify-center p-6 antialiased font-body selection:bg-secondary selection:text-on-secondary">
<!-- Header / Branding -->
<div class="mb-10 text-center flex flex-col items-center">
<div class="w-16 h-16 bg-surface-container-lowest rounded-2xl flex items-center justify-center mb-6 shadow-[0_8px_32px_rgba(0,0,0,0.2)]">
<span class="material-symbols-outlined text-4xl text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<h1 class="font-headline text-4xl md:text-5xl font-extrabold text-on-primary tracking-tight">ShopFlow</h1>
<p class="font-body text-inverse-primary mt-3 text-lg font-medium opacity-90">Sovereign Retail Management</p>
</div>
<!-- Login Card -->
<main class="w-full max-w-[500px] bg-surface-container-lowest rounded-[1.5rem] shadow-[0_24px_48px_rgba(4,10,26,0.4)] p-8 md:p-10 flex flex-col relative overflow-hidden">
<!-- Subtle top highlight for glass feel -->
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-secondary-fixed-dim to-transparent opacity-20"></div>
<!-- Role Selector (Moved to top for logical flow before auth type, as per some modern SaaS patterns, though prompt said bottom. I will adhere to bottom later, but let's keep tabs at top) -->
<!-- Tabs -->
<div class="flex bg-surface-container-low p-1.5 rounded-xl mb-10 w-full">
<button class="flex-1 py-3 text-center rounded-lg bg-surface-container-lowest text-primary font-headline font-bold shadow-sm text-sm transition-all flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]">dialpad</span>
                PIN Login
            </button>
<button class="flex-1 py-3 text-center rounded-lg text-on-surface-variant hover:text-on-surface font-headline font-semibold text-sm transition-all flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]">key</span>
                Password
            </button>
</div>
<!-- PIN Entry View (Active) -->
<div class="flex flex-col items-center w-full" id="pin-view">
<h2 class="font-headline text-2xl font-bold text-on-background mb-2">Enter your PIN</h2>
<p class="font-body text-sm text-on-surface-variant mb-8">Secure access to your terminal</p>
<!-- PIN Progress Dots -->
<div class="flex justify-center gap-4 mb-10">
<div class="w-4 h-4 rounded-full bg-secondary shadow-[0_0_12px_rgba(0,108,73,0.4)]"></div>
<div class="w-4 h-4 rounded-full bg-secondary shadow-[0_0_12px_rgba(0,108,73,0.4)]"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-high"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-high"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-high"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-high"></div>
</div>
<!-- Numpad Grid -->
<div class="grid grid-cols-3 gap-3 w-full max-w-[320px] mx-auto mb-8">
<!-- Row 1 -->
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">1</button>
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">2</button>
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">3</button>
<!-- Row 2 -->
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">4</button>
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">5</button>
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">6</button>
<!-- Row 3 -->
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">7</button>
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">8</button>
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">9</button>
<!-- Row 4 -->
<div class="h-16"></div> <!-- Empty space -->
<button class="h-16 rounded-xl bg-surface-container-low hover:bg-surface-variant active:scale-95 text-on-background font-headline text-2xl font-semibold transition-all flex items-center justify-center">0</button>
<button class="h-16 rounded-xl bg-surface-container-lowest text-on-surface-variant hover:text-on-background active:scale-95 transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
</div>
<!-- Password View (Hidden by default to show clean single-page state, but structure exists) -->
<div class="hidden flex-col w-full" id="password-view">
<h2 class="font-headline text-2xl font-bold text-on-background mb-6 text-center">Sign In</h2>
<div class="flex flex-col gap-5 mb-8">
<div class="flex flex-col gap-2">
<label class="font-label text-sm font-medium text-on-surface-variant pl-1">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">mail</span>
<input class="w-full h-14 bg-surface-container-high rounded-xl pl-12 pr-4 text-on-background font-body text-base border-none focus:ring-0 placeholder:text-outline-variant transition-colors focus-within:bg-surface-container focus-within:shadow-[inset_0_0_0_2px_rgba(8,21,52,0.2)]" placeholder="manager@store.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center pl-1 pr-1">
<label class="font-label text-sm font-medium text-on-surface-variant">Password</label>
<a class="font-label text-sm font-medium text-secondary hover:text-secondary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">lock</span>
<input class="w-full h-14 bg-surface-container-high rounded-xl pl-12 pr-4 text-on-background font-body text-base border-none focus:ring-0 placeholder:text-outline-variant transition-colors focus-within:bg-surface-container focus-within:shadow-[inset_0_0_0_2px_rgba(8,21,52,0.2)]" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary-container text-on-primary rounded-xl font-headline font-bold text-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98]">
            Access Terminal
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Role Selector at Bottom -->
<div class="mt-8 pt-6 border-t-0 flex flex-col items-center">
<!-- No border line used as per design system, using tonal shift via padding/margin to separate -->
<p class="font-label text-xs text-on-surface-variant mb-3 uppercase tracking-wider font-semibold">Operating As</p>
<div class="flex bg-surface-container p-1 rounded-full w-max">
<button class="px-6 py-2 rounded-full bg-surface-container-lowest text-primary font-body text-sm font-bold shadow-sm transition-all">
                    Owner
                </button>
<button class="px-6 py-2 rounded-full text-on-surface-variant hover:text-on-surface font-body text-sm font-medium transition-all">
                    Staff
                </button>
</div>
</div>
</main>
<!-- Footer subtle text -->
<div class="mt-8 text-center text-inverse-surface/60 font-label text-sm font-medium">
        System Status: <span class="text-secondary-fixed-dim">Online</span> • v2.4.1
    </div>
</body></html>
